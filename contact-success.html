<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Message Sent | District 10 AA</title>
    <meta
      name="description"
      content="Confirmation page for District 10 AA contact form submissions."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: "#24273a",
              mantle: "#1e2030",
              crust: "#181926",
              text: "#cad3f5",
              subtext0: "#a5adcb",
              surface0: "#363a4f",
              blue: "#8aadf4",
              lavender: "#b7bdf8",
              green: "#a6da95"
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at 15% 10%, rgba(138, 173, 244, 0.2), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(125, 196, 228, 0.14), transparent 35%),
          #24273a;
      }
    </style>
  </head>
  <body class="text-text min-h-screen antialiased">
    <main class="mx-auto flex min-h-screen max-w-3xl items-center px-6 py-12">
      <section class="w-full rounded-3xl border border-surface0 bg-mantle/50 p-8 text-center md:p-12">
        <p class="text-sm font-semibold uppercase tracking-wide text-green">Message sent</p>
        <h1 class="mt-2 text-3xl font-extrabold text-lavender md:text-4xl">Thank you</h1>
        <p class="mt-3 text-subtext0">Your message was submitted successfully.</p>
        <a
          href="index.html"
          class="mt-6 inline-flex rounded-xl bg-blue px-5 py-3 text-sm font-semibold text-crust transition hover:bg-lavender"
          >Return Home</a
        >
      </section>
    </main>
  </body>
</html>
