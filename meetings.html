<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find a Meeting | District 10 AA</title>
    <meta
      name="description"
      content="District 10 AA meeting schedule with date filter."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: "#24273a",
              mantle: "#1e2030",
              crust: "#181926",
              text: "#cad3f5",
              subtext0: "#a5adcb",
              subtext1: "#b8c0e0",
              surface0: "#363a4f",
              surface1: "#494d64",
              surface2: "#5b6078",
              blue: "#8aadf4",
              lavender: "#b7bdf8",
              sapphire: "#7dc4e4",
              green: "#a6da95",
              yellow: "#eed49f",
              peach: "#f5a97f",
              maroon: "#ee99a0",
              red: "#ed8796"
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at 15% 10%, rgba(138, 173, 244, 0.2), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(125, 196, 228, 0.14), transparent 35%),
          #24273a;
      }
    </style>
  </head>
  <body class="text-text min-h-screen antialiased">
    <header class="sticky top-0 z-50 border-b border-surface0/70 bg-mantle/90 backdrop-blur">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="index.html" class="text-lg font-bold tracking-wide text-lavender">District 10 AA</a>
        <div class="hidden gap-6 text-sm text-subtext1 md:flex">
          <a class="transition hover:text-blue" href="index.html#meetings">Meetings</a>
          <a class="transition hover:text-blue" href="events.html">Events</a>
          <a class="transition hover:text-blue" href="index.html#resources">Resources</a>
          <a class="transition hover:text-blue" href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-12 md:py-16">
      <section class="rounded-3xl border border-surface0 bg-mantle/50 p-8 md:p-12">
        <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <h1 class="text-3xl font-extrabold text-lavender md:text-4xl">Find a Meeting</h1>
            <p class="mt-2 text-subtext0">Select a day to show matching meetings.</p>
          </div>
          <div class="w-full md:w-auto">
            <label for="day-filter" class="mb-2 block text-sm font-semibold text-subtext1">Filter by day</label>
            <div class="flex gap-2">
              <select
                id="day-filter"
                class="w-full rounded-xl border border-surface1 bg-base px-4 py-2 text-sm text-text outline-none ring-blue/40 focus:ring md:w-56"
              ></select>
              <button
                id="clear-filter"
                class="rounded-xl border border-surface1 bg-surface0/60 px-4 py-2 text-sm font-semibold text-subtext1 transition hover:border-blue hover:text-blue"
              >
                Clear
              </button>
            </div>
          </div>
        </div>

        <p id="filter-status" class="mt-5 text-sm text-sapphire"></p>

        <div class="mt-6 overflow-x-auto rounded-2xl border border-surface0">
          <table class="min-w-full divide-y divide-surface0 text-sm">
            <thead class="bg-crust/80 text-left text-subtext1">
              <tr>
                <th class="px-4 py-3 font-semibold">Day</th>
                <th class="px-4 py-3 font-semibold">Time</th>
                <th class="px-4 py-3 font-semibold">Group</th>
                <th class="px-4 py-3 font-semibold">Format</th>
                <th class="px-4 py-3 font-semibold">Location</th>
                <th class="px-4 py-3 font-semibold">Address</th>
                <th class="px-4 py-3 font-semibold">Notes</th>
              </tr>
            </thead>
            <tbody id="meetings-table-body" class="divide-y divide-surface0 bg-mantle/60"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="border-t border-surface0 bg-crust/80">
      <div class="mx-auto flex max-w-6xl flex-col gap-2 px-6 py-8 text-sm text-subtext0 md:flex-row md:items-center md:justify-between">
        <p>District 10 AA</p>
        <a class="transition hover:text-blue" href="contact.html">Contact Form</a>
      </div>
    </footer>

    <script src="assets/js/meetings-data.js"></script>
    <script>
      const dayNames = window.DISTRICT10_DAY_NAMES;
      const meetings = window.DISTRICT10_MEETINGS;
      const todayName = dayNames[new Date().getDay()];
      const dayOrder = {
        Sunday: 0,
        Monday: 1,
        Tuesday: 2,
        Wednesday: 3,
        Thursday: 4,
        Friday: 5,
        Saturday: 6
      };

      const isIPhone = /iPhone/i.test(navigator.userAgent);

      function getMapUrl(meeting) {
        const query = encodeURIComponent(`${meeting.location}, ${meeting.address}`);
        return isIPhone
          ? `https://maps.apple.com/?q=${query}`
          : `https://www.google.com/maps/search/?api=1&query=${query}`;
      }

      const tableBody = document.getElementById("meetings-table-body");
      const dayFilter = document.getElementById("day-filter");
      const clearFilterButton = document.getElementById("clear-filter");
      const filterStatus = document.getElementById("filter-status");
      const dayOptions = [todayName, "All Days", ...dayNames.filter((day) => day !== todayName)];
      dayFilter.innerHTML = dayOptions
        .map((day) => `<option value="${day}">${day}</option>`)
        .join("");
      dayFilter.value = todayName;

      function parseTimeToMinutes(timeStr) {
        const match = timeStr.match(/(\d+):(\d+)\s*(am|pm)/i);
        if (!match) return Number.MAX_SAFE_INTEGER;

        let hour = parseInt(match[1], 10);
        const minute = parseInt(match[2], 10);
        const period = match[3].toLowerCase();

        if (period === "pm" && hour !== 12) hour += 12;
        if (period === "am" && hour === 12) hour = 0;

        return hour * 60 + minute;
      }

      function sortMeetings(items) {
        return [...items].sort((a, b) => {
          const dayDiff = dayOrder[a.day] - dayOrder[b.day];
          if (dayDiff !== 0) return dayDiff;
          return parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time);
        });
      }

      function renderRows(items) {
        if (items.length === 0) {
          tableBody.innerHTML =
            '<tr><td colspan="7" class="px-4 py-6 text-center text-subtext1">No meetings found for this day.</td></tr>';
          return;
        }

        tableBody.innerHTML = sortMeetings(items)
          .map(
            (meeting) => `
              <tr>
                <td class="px-4 py-3 text-subtext1">${meeting.day}</td>
                <td class="px-4 py-3 text-text">${meeting.time}</td>
                <td class="px-4 py-3 text-text">${meeting.group}</td>
                <td class="px-4 py-3 text-subtext1">${meeting.format}</td>
                <td class="px-4 py-3 text-subtext1">${meeting.location}</td>
                <td class="px-4 py-3 text-subtext1">
                  ${meeting.address}
                  <a
                    class="mt-1 block text-xs font-semibold text-blue transition hover:text-lavender"
                    href="${getMapUrl(meeting)}"
                    target="_blank"
                    rel="noopener noreferrer"
                    >Open Map</a
                  >
                </td>
                <td class="px-4 py-3 text-sapphire">${meeting.notes || "-"}</td>
              </tr>
            `
          )
          .join("");
      }

      function applyDayFilter() {
        const selectedDay = dayFilter.value;

        if (selectedDay === "All Days") {
          filterStatus.textContent = "Showing all meetings.";
          renderRows(meetings);
          return;
        }

        const filtered = meetings.filter((meeting) => meeting.day === selectedDay);
        filterStatus.textContent = `Showing ${selectedDay} meetings.`;
        renderRows(filtered);
      }

      dayFilter.addEventListener("change", applyDayFilter);
      clearFilterButton.addEventListener("click", () => {
        dayFilter.value = "All Days";
        applyDayFilter();
      });

      applyDayFilter();
    </script>
  </body>
</html>
