<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Details | District 10 AA</title>
    <meta
      name="description"
      content="District 10 AA event details, schedule information, and available flyers."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: "#24273a",
              mantle: "#1e2030",
              crust: "#181926",
              text: "#cad3f5",
              subtext0: "#a5adcb",
              subtext1: "#b8c0e0",
              surface0: "#363a4f",
              surface1: "#494d64",
              blue: "#8aadf4",
              lavender: "#b7bdf8",
              sapphire: "#7dc4e4",
              yellow: "#eed49f"
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at 15% 10%, rgba(138, 173, 244, 0.2), transparent 30%),
          radial-gradient(circle at 80% 0%, rgba(125, 196, 228, 0.14), transparent 35%),
          #24273a;
      }
    </style>
  </head>
  <body class="text-text min-h-screen antialiased">
    <header class="sticky top-0 z-50 border-b border-surface0/70 bg-mantle/90 backdrop-blur">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="index.html" class="text-lg font-bold tracking-wide text-lavender">District 10 AA</a>
        <div class="hidden gap-6 text-sm text-subtext1 md:flex">
          <a class="transition hover:text-blue" href="events.html">Events</a>
          <a class="transition hover:text-blue" href="meetings.html">Meetings</a>
          <a class="transition hover:text-blue" href="minutes.html">Minutes</a>
          <a class="transition hover:text-blue" href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-12 md:py-16">
      <a
        href="events.html"
        class="inline-flex rounded-xl border border-surface1 bg-surface0/60 px-4 py-2 text-sm font-semibold text-subtext1 transition hover:border-blue hover:text-blue"
        >Back to Events</a
      >

      <section id="event-card" class="mt-6 rounded-3xl border border-surface0 bg-mantle/50 p-8 md:p-12"></section>
    </main>

    <footer class="border-t border-surface0 bg-crust/80">
      <div class="mx-auto flex max-w-6xl flex-col gap-2 px-6 py-8 text-sm text-subtext0 md:flex-row md:items-center md:justify-between">
        <p>District 10 AA</p>
        <a class="transition hover:text-blue" href="contact.html">Contact Form</a>
      </div>
    </footer>

    <script src="assets/js/content-data.js"></script>
    <script>
      const content = window.DISTRICT10_CONTENT || {};
      const events = content.events || [];
      const cardEl = document.getElementById("event-card");
      function formatDateRange(event) {
        const format = { month: "long", day: "numeric", year: "numeric", timeZone: "America/New_York" };
        const start = new Date(`${event.startDate}T00:00:00`);
        const end = new Date(`${event.endDate}T00:00:00`);
        const startText = start.toLocaleDateString("en-US", format);
        const endText = end.toLocaleDateString("en-US", format);
        return startText === endText ? startText : `${startText} - ${endText}`;
      }

      const params = new URLSearchParams(window.location.search);
      const slug = params.get("event");
      const event = events.find((item) => item.slug === slug);

      if (!event) {
        cardEl.innerHTML = `
          <h1 class="text-3xl font-extrabold text-lavender md:text-4xl">Event Not Found</h1>
          <p class="mt-3 text-subtext0">The selected event could not be loaded.</p>
        `;
      } else {
        document.title = `${event.title} | District 10 AA`;
        cardEl.innerHTML = `
          <p class="inline-block rounded-full border border-surface1 bg-surface0/70 px-3 py-1 text-xs uppercase tracking-[0.14em] text-sapphire">
            Event Details
          </p>
          <h1 class="mt-3 text-3xl font-extrabold text-lavender md:text-4xl">${event.title}</h1>
          ${event.subtitle ? `<p class="mt-2 text-subtext0">${event.subtitle}</p>` : ""}

          <div class="mt-6 grid gap-4 md:grid-cols-2">
            <div class="rounded-2xl border border-surface0 bg-base/50 p-4">
              <p class="text-xs uppercase tracking-wide text-sapphire">Date</p>
              <p class="mt-1 font-semibold text-yellow">${formatDateRange(event)}</p>
            </div>
            <div class="rounded-2xl border border-surface0 bg-base/50 p-4">
              <p class="text-xs uppercase tracking-wide text-sapphire">Time</p>
              <p class="mt-1 font-semibold text-text">${event.timeText || "Time TBD"}</p>
            </div>
            <div class="rounded-2xl border border-surface0 bg-base/50 p-4">
              <p class="text-xs uppercase tracking-wide text-sapphire">Location</p>
              <p class="mt-1 font-semibold text-text">${event.location}</p>
              <p class="mt-1 text-sm text-subtext0">${event.address}</p>
            </div>
            <div class="rounded-2xl border border-surface0 bg-base/50 p-4">
              <p class="text-xs uppercase tracking-wide text-sapphire">Links</p>
              <div class="mt-2 flex flex-wrap gap-3">
                ${event.websiteUrl ? `<a class="text-sm font-semibold text-blue transition hover:text-lavender" href="${event.websiteUrl}" target="_blank" rel="noopener noreferrer">Event Website</a>` : ""}
                ${event.pdfUrl ? `<a class="text-sm font-semibold text-blue transition hover:text-lavender" href="${event.pdfUrl}" target="_blank" rel="noopener noreferrer">Open Flyer PDF</a>` : ""}
              </div>
            </div>
          </div>

          ${
            Array.isArray(event.details) && event.details.length
              ? `
                <div class="mt-6 rounded-2xl border border-surface0 bg-base/50 p-5">
                  <h2 class="text-lg font-semibold text-text">More Information</h2>
                  <ul class="mt-3 space-y-2 text-sm text-subtext1">
                    ${event.details.map((line) => `<li>${line}</li>`).join("")}
                  </ul>
                </div>
              `
              : ""
          }

          ${
            event.pdfUrl
              ? `
                <div class="mt-6 rounded-2xl border border-surface0 bg-base/50 p-5">
                  <h2 class="text-lg font-semibold text-text">Flyer Preview</h2>
                  <p class="mt-2 text-sm text-subtext0">If the preview does not load, use the Open Flyer PDF link above.</p>
                  <iframe
                    class="mt-4 h-[720px] w-full rounded-xl border border-surface0 bg-crust"
                    src="${event.pdfUrl}"
                    title="${event.title} Flyer PDF"
                    loading="lazy"
                  ></iframe>
                </div>
              `
              : ""
          }
        `;
      }

    </script>
  </body>
</html>
